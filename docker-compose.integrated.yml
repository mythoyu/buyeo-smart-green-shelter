# PC A: 내장 Modbus /dev/ttyS0. 피플카운터(APC)는 USB + udev(/dev/bushub-people-counter-N) — docker-compose.common.* 로 마운트.
# USB 변환기만 쓰는 PC B는 docker-compose.usb485.yml 사용.
services:
  db:
    image: mongo:6.0.15
    container_name: bushub-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bushub_client
      # Mongo root — .env.prod 와 동기 (변경 시 usb485.yml 도 수정)
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: sw-smartcity-db
    networks:
      - bushub-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "admin",
          "-p",
          "sw-smartcity-db",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    container_name: bushub-backend
    image: bushub-backend:${GITHUB_REF_NAME:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - backend_logs:/app/logs
      - /dev/ttyS0:/dev/ttyS0:rw
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    user: "0:20"
    environment:
      NODE_ENV: production
      APP_MODE: production
      JWT_SECRET: dev-only-jwt-secret-minimum-32-characters-long
      MONGODB_URI: mongodb://admin:sw-smartcity-db@db:27017/bushub_client?authSource=admin
      LOG_LEVEL: info
      MODBUS_MOCK_ENABLED: "false"
      MODBUS_PORT: /dev/ttyS0
      MODBUS_BAUD_RATE: "9600"
      MODBUS_RTSCTS: "false"
      PEOPLE_COUNTER_COUNT: ${PEOPLE_COUNTER_COUNT:-0}
      SUPERIOR_SERVER_URL: http://10.20.60.145:9202/api/v1/ping
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bushub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    command: ["pnpm", "run", "start:production"]

  frontend:
    container_name: bushub-frontend
    image: bushub-frontend:${GITHUB_REF_NAME:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bushub-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.28.0
    container_name: bushub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./packages/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./packages/nginx/mime.types:/etc/nginx/mime.types:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - bushub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bushub-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  db_data:
    driver: local
  backend_logs:
    driver: local
