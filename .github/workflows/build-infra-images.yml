# infra Docker 이미지 tar 수동 빌드 (Release 없이 테스트용)
name: Build infra docker images (manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload-artifact:
    runs-on: ubuntu-22.04
    steps:
      - name: Pull and save infra images
        run: |
          docker pull mongo:6.0.15
          docker pull nginx:1.28.0
          docker pull node:18-alpine
          docker save -o infra-docker-images.tar \
            mongo:6.0.15 \
            nginx:1.28.0 \
            node:18-alpine
          ls -lh infra-docker-images.tar

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-docker-images
          path: infra-docker-images.tar
          retention-days: 30
