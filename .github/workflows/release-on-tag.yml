name: Release on tag (source-only)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Create GitHub Release (no artifacts)
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 현장 설치(소스 기준)
            1) 현장 PC에서 저장소 clone
            2) 태그 체크아웃
               git fetch origin --tags
               git checkout ${{ github.ref_name }}
            3) 모노레포 루트에서 실행
               ./scripts/install-field.sh

            ## 운영 방식
            - 앱 이미지는 레지스트리(GHCR 등)에 배포하지 않습니다.
            - 현장에서 소스 기준으로 `rebuild-and-up-*`가 `docker build`로 이미지를 생성합니다.
