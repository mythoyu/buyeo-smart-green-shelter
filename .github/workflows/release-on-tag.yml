name: Release on tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 현장 설치 (앱 소스)

            ### USB 번들 (오프라인 권장)

            ```text
            bushub-deploy/
            ├── buyeo-smart-green-shelter/   # 이 Release 태그로 checkout 또는 Source zip
            └── docker-images/
                └── infra-docker-images.tar   # 별도 1회 — Actions「Build infra docker images (manual)」artifact
            ```

            ### 1. 소스

            ```bash
            git fetch origin --tags
            git checkout ${{ github.ref_name }}
            ```

            Mongo/JWT 는 `docker-compose.*.yml` 에 고정 (`.env.prod` 와 동기).

            ### 2. install (Docker·apt·infra load)

            ```bash
            ./scripts/install-field.sh install
            # 재부팅 또는 재로그인 후
            ./scripts/install-field.sh ports
            ```

            **infra tar** (`mongo`, `nginx`, `node`)는 이 Release 에 포함되지 않습니다.
            USB `../docker-images/` 또는 Actions → **Build infra docker images (manual)** artifact 를 사용하세요.

            ### 3. post-ports (앱 이미지 빌드 + 기동)

            ```bash
            ./scripts/install-field.sh post-ports
            ```

            ### 운영 방식

            - **infra**: USB / infra 전용 workflow artifact (앱 태그마다 재업로드 없음)
            - **앱**: 현장 `docker build` (`post-ports`)
            - 자세한 내용: `docs/DEPLOYMENT.md`, `docs/COMMON_COMMANDS.md`
