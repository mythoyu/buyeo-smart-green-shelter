# PC B: USB-시리얼을 udev 규칙으로 고정합니다.
# Modbus(DDC/Modbus)는 /dev/bushub-controller
# PeopleCounter(APC)는 별도 override compose에서 마운트합니다.
# udev: 저장소 루트 ./scripts/install-field.sh 또는 scripts/lib/udev/…
# 규칙 설치 후 rebuild-and-up-usb485.sh 등으로 이 compose 를 up 하세요.
services:
  # MongoDB 데이터베이스
  db:
    image: mongo:6.0.15
    container_name: bushub-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=bushub_client
    networks:
      - bushub-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 백엔드 API 서버 (내부망 API 직접: http://호스트:3000 — 0.0.0.0 바인딩)
  backend:
    container_name: bushub-backend
    image: bushub-backend:${GITHUB_REF_NAME:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - backend_logs:/app/logs
      # Docker 기본: 소스 없으면 호스트에 빈 디렉터리 생성 → /dev udev 링크가 막힘. create_host_path: false 로 방지
      - type: bind
        source: /dev/bushub-controller
        target: /dev/bushub-controller
        bind:
          create_host_path: false
      # D-Bus 소켓 마운트 (NetworkManager 통신용)
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    privileged: true
    user: "0:20" # root:dialout 그룹으로 실행
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-youjobs-secret-key-2025}
      - MONGODB_URI=mongodb://db:27017/bushub_client
      - LOG_LEVEL=info
      - MODBUS_MOCK_ENABLED=false
      - MODBUS_PORT=/dev/bushub-controller
      - MODBUS_BAUD_RATE=9600
      - MODBUS_RTSCTS=${MODBUS_RTSCTS:-false} # RTS/CTS 흐름 제어 (기본값: false)
      - SUPERIOR_SERVER_URL=http://10.20.60.145:9202/api/v1/ping
    depends_on:
      - db
    networks:
      - bushub-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    command: ["pnpm", "run", "start:production"]

  # 프론트엔드 웹 서버 (내부망 직접 접속: http://호스트:8080 — 0.0.0.0 바인딩)
  frontend:
    container_name: bushub-frontend
    image: bushub-frontend:${GITHUB_REF_NAME:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - bushub-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # nginx 리버스 프록시 (내부망: http://호스트:80 — 0.0.0.0 바인딩)
  nginx:
    image: nginx:1.28.0
    container_name: bushub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./bushub-client/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./bushub-client/nginx/mime.types:/etc/nginx/mime.types:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bushub-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 네트워크 정의 (172.17~20 등과 겹침 시 Pool overlaps 방지용 대역)
networks:
  bushub-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# 볼륨 정의
volumes:
  db_data:
    driver: local
  backend_logs:
    driver: local
