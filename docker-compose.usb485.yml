# PC B: USB-시리얼을 udev 규칙으로 고정합니다.
# Modbus(DDC/Modbus)는 /dev/bushub-controller
# PeopleCounter(APC)는 별도 override compose에서 마운트합니다.
# udev: 저장소 루트 ./scripts/install-field.sh 또는 scripts/lib/udev/…
# 규칙 설치 후 rebuild-and-up-usb485.sh 등으로 이 compose 를 up 하세요.
# 프로젝트명·볼륨·네트워크는 폴더/버전과 무관하게 고정 (integrated.yml 과 동일).
name: bushub-field

services:
  # MongoDB 데이터베이스
  db:
    image: mongo:6.0.15
    container_name: sw-by-bushub-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bushub_client
      # Mongo root — .env.prod 와 동기 (변경 시 integrated.yml 도 수정)
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: sw-smartcity-db
    networks:
      - bushub-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "admin",
          "-p",
          "sw-smartcity-db",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 백엔드 API 서버 (내부망 API 직접: http://호스트:3000 — 0.0.0.0 바인딩)
  backend:
    container_name: bushub-backend
    image: bushub-backend:${GITHUB_REF_NAME:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - backend_logs:/app/logs
      - type: bind
        source: /dev/bushub-controller
        target: /dev/bushub-controller
        bind:
          create_host_path: false
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    user: "0:20"
    environment:
      NODE_ENV: production
      APP_MODE: production
      JWT_SECRET: dev-only-jwt-secret-minimum-32-characters-long
      MONGODB_URI: mongodb://admin:sw-smartcity-db@db:27017/bushub_client?authSource=admin
      LOG_LEVEL: info
      MODBUS_MOCK_ENABLED: "false"
      MODBUS_PORT: /dev/bushub-controller
      MODBUS_BAUD_RATE: "9600"
      MODBUS_RTSCTS: "false"
      PEOPLE_COUNTER_COUNT: ${PEOPLE_COUNTER_COUNT:-0}
      SUPERIOR_SERVER_URL: http://10.20.60.145:9202/api/v1/ping
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bushub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    command: ["pnpm", "run", "start:production"]

  # 프론트엔드 웹 서버 (내부망 직접 접속: http://호스트:8080 — 0.0.0.0 바인딩)
  frontend:
    container_name: bushub-frontend
    image: bushub-frontend:${GITHUB_REF_NAME:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bushub-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # nginx 리버스 프록시 (내부망: http://호스트:80 — 0.0.0.0 바인딩)
  nginx:
    image: nginx:1.28.0
    container_name: bushub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./packages/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./packages/nginx/mime.types:/etc/nginx/mime.types:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - bushub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bushub-network:
    name: bushub_network
    driver: bridge

volumes:
  db_data:
    name: bushub_db_data
    driver: local
  backend_logs:
    name: bushub_backend_logs
    driver: local
