# USB-RS485 PeopleCounter 환경변수만 (디바이스 마운트는 PEOPLE_COUNTER_COUNT 에 맞게 pc-dev-N.yml 을 추가)
# 사용: scripts/lib/run-docker-stack.sh 가 people-counter + pc-dev-1..N 를 붙입니다.
# 수동 예(1대): docker compose -f docker-compose.usb485.yml -f docker-compose.usb485.people-counter.yml -f docker-compose.usb485.pc-dev-1.yml up -d
services:
  backend:
    environment:
      # 멀티 유닛 포트 목록(프로브 순서=유닛 번호). 미설정 시 run-docker-stack.sh 가 PEOPLE_COUNTER_COUNT 로 1..N 경로를 채움
      - PEOPLE_COUNTER_PORTS=${PEOPLE_COUNTER_PORTS:-/dev/bushub-people-counter-1}
      - PEOPLE_COUNTER_BAUD_RATE=9600
